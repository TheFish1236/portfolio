name: Deploy Portfolio to AWS S3 & CloudFront

on:
  push:
    branches:
      - main # Triggers automatically whenever you push code to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the source code from GitHub repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Step 3: Install dependencies & Build static assets
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      # Step 4: Configure AWS Credentials using GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Sync dist/ folder contents to S3 Bucket
      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://thefish1236.com --delete

      # Step 6: Create CloudFront Invalidation
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"